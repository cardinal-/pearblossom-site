<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pearblossom</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #EAEAE5;
      color: #00092B;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    h1 {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }

    p {
      font-size: 18px;
      color: #51537F;
      margin-bottom: 48px;
    }

    .coming-soon {
      display: inline-block;
      background-color: #F8F8EF;
      color: #00092B;
      border: 1.5px solid #00092B;
      padding: 14px 32px;
      font-size: 16px;
      letter-spacing: 0.5px;
      box-shadow: 3px 3px 0px #51537F;
    }

    footer {
      position: fixed;
      bottom: 24px;
      font-size: 13px;
      color: #51537F;
    }

    footer a {
      color: #51537F;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1>Pearblossom</h1>
  <p>A new way to compose photos. Coming soon.</p>
  <div class="coming-soon">Available on the App Store</div>

  <footer>
    <a href="/pearblossom-site/privacy/">Privacy Policy</a>
  </footer>

</body>
</html>
